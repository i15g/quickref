[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
]

# Ruff lints and formats Python files and fenced Python code blocks in markdown.
# ruff-format requires --preview for markdown support (experimental feature).
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.11"
hooks = [
  { id = "ruff-check", args = ["--fix"], types_or = ["python", "pyi", "markdown"] }, # linter
  { id = "ruff-format", args = ["--preview"], types_or = ["python", "pyi", "markdown"] },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "prettier"
name = "prettier"
entry = "npx --yes prettier@3.8.1 --write"
language = "system"
types_or = ["json", "markdown", "yaml"]
